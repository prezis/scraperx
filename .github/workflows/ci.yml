name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install core
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest

      - name: Test (core, no extras)
        run: pytest -v

      - name: Install optional extras
        run: pip install "imagehash>=4.3" "Pillow>=10.0" "beautifulsoup4>=4.12"

      - name: Test (with extras)
        run: pytest -v
